<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Budget Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #f8fafc;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px 48px;
      -webkit-tap-highlight-color: transparent;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      text-decoration: none;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 320px;
      margin-bottom: 16px;
    }

    .month-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #64748b;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    .nav-btn:active { color: #0f172a; }

    /* Budget card */
    .budget-card {
      width: 100%;
      max-width: 320px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 20px 24px;
      margin-bottom: 16px;
    }

    .budget-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }

    .budget-section-label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
    }

    .budget-set-btn {
      background: none;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      color: #64748b;
      font-size: 11px;
      font-family: inherit;
      padding: 4px 10px;
      cursor: pointer;
      letter-spacing: 0.05em;
    }

    .budget-set-btn:active { color: #0f172a; border-color: #94a3b8; }

    .budget-period-label {
      font-size: 12px;
      color: #475569;
      margin-bottom: 14px;
    }

    .budget-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 14px;
    }

    .budget-stat { display: flex; flex-direction: column; gap: 4px; }

    .budget-stat-val {
      font-size: 20px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1;
    }

    .budget-stat-val.over { color: #ef4444; }
    .budget-stat-val.warning { color: #f59e0b; }
    .budget-stat-val.dim { color: #64748b; font-size: 16px; }

    .budget-stat-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
    }

    .progress-bar {
      width: 100%;
      height: 3px;
      background: #f1f5f9;
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-fill {
      height: 100%;
      background: #fff;
      border-radius: 2px;
      transition: width 0.3s ease;
    }

    .progress-fill.warning { background: #f59e0b; }
    .progress-fill.over { background: #ef4444; }

    /* Set budget form */
    .set-form { display: none; flex-direction: column; gap: 10px; }
    .set-form.visible { display: flex; }

    .set-form-row { display: flex; gap: 8px; align-items: center; }

    .set-form-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      width: 40px;
      flex-shrink: 0;
    }

    input[type="date"], input[type="number"] {
      flex: 1;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 10px 14px;
      color: #0f172a;
      font-size: 14px;
      font-family: inherit;
      outline: none;
      color-scheme: dark;
    }

    input::placeholder { color: #475569; }
    input:focus { border-color: #94a3b8; }

    button.save-btn, button.add-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      white-space: nowrap;
    }

    button.save-btn:active, button.add-btn:active { opacity: 0.8; }

    /* Calendar */
    .calendar {
      width: 100%;
      max-width: 320px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }

    .day-header {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #475569;
      text-align: center;
      padding: 4px 0 8px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      transition: background 0.15s;
      gap: 2px;
    }

    .day.empty { background: transparent; border-color: transparent; cursor: default; }
    .day.today { border-color: #94a3b8; }
    .day.selected { background: #fff; border-color: #0f172a; }
    .day.has-spend { border-color: #334155; }
    .day.in-period { border-color: #334155; background: #ffffff; }
    .day:not(.empty):active { background: #f1f5f9; }
    .day.selected:active { background: #ddd; }

    .day-num {
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      color: #0f172a;
    }

    .day.selected .day-num { color: #000; }

    .day-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #555;
    }

    .day.selected .day-dot { background: #000; opacity: 0.4; }

    /* Entry panel */
    .panel {
      width: 100%;
      max-width: 320px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 24px;
      display: none;
    }

    .panel.visible { display: block; }

    .panel-date {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 16px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }

    .total-label {
      font-size: 12px;
      color: #64748b;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .total-value {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .input-row { display: flex; gap: 8px; }

    .entries-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-time { font-size: 12px; color: #475569; }

    .entry-val {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      color: #ccc;
    }

    .entry-del {
      background: none;
      border: none;
      color: #334155;
      cursor: pointer;
      font-size: 14px;
      padding: 0 0 0 12px;
    }

    .entry-del:active { color: #ef4444; }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Back</a>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Budget Card -->
  <div class="budget-card">
    <div class="budget-top">
      <div class="budget-section-label">Budget</div>
      <button class="budget-set-btn" onclick="toggleSetForm()">Set period</button>
    </div>

    <div class="set-form" id="setForm">
      <div class="set-form-row">
        <div class="set-form-label">From</div>
        <input type="date" id="fromDate" />
      </div>
      <div class="set-form-row">
        <div class="set-form-label">Until</div>
        <input type="date" id="toDate" />
      </div>
      <div class="set-form-row">
        <div class="set-form-label">£</div>
        <input type="number" id="budgetAmt" placeholder="Budget amount" min="0" />
        <button class="save-btn" onclick="savePeriod()">Save</button>
      </div>
    </div>

    <div id="budgetDisplay">
      <div class="budget-period-label" id="periodLabel">No budget set</div>
      <div class="budget-stats">
        <div class="budget-stat">
          <div class="budget-stat-val" id="statBudget">—</div>
          <div class="budget-stat-label">Budget</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val" id="statSpent">£0</div>
          <div class="budget-stat-label">Spent</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val" id="statRemaining">—</div>
          <div class="budget-stat-label">Remaining</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val dim" id="statAvgSpent">—</div>
          <div class="budget-stat-label">Avg/day spent</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val dim" id="statAvgLeft">—</div>
          <div class="budget-stat-label">Avg/day left</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="panel" id="panel">
    <div class="panel-date" id="panelDate"></div>
    <div class="total-row">
      <div class="total-label">Total Spend</div>
      <div class="total-value" id="totalSpend">£0</div>
    </div>
    <div class="input-row">
      <input type="number" id="valueInput" placeholder="Add value" min="0" step="0.01" />
      <button class="add-btn" onclick="addValue()">Add</button>
    </div>
    <div class="entries-list" id="entriesList"></div>
  </div>

  <script>
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    let current = new Date();
    let viewYear = current.getFullYear();
    let viewMonth = current.getMonth();
    let selectedDate = null;

    function toDateStr(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function daysBetween(a, b) {
      return Math.round((parseDate(b) - parseDate(a)) / 86400000);
    }

    function getEntries(dateStr) {
      return JSON.parse(localStorage.getItem('budget_' + dateStr) || '[]');
    }

    function saveEntries(dateStr, entries) {
      localStorage.setItem('budget_' + dateStr, JSON.stringify(entries));
    }

    function getPeriod() {
      return JSON.parse(localStorage.getItem('budget_period') || 'null');
    }

    function getPeriodTotal(period) {
      let total = 0;
      const from = parseDate(period.from);
      const to = parseDate(period.to);
      for (let d = new Date(from); d <= to; d.setDate(d.getDate() + 1)) {
        getEntries(toDateStr(new Date(d))).forEach(e => total += e.val);
      }
      return total;
    }

    function renderBudgetCard() {
      const period = getPeriod();
      if (!period) {
        document.getElementById('periodLabel').textContent = 'No budget set — tap "Set period"';
        document.getElementById('statBudget').textContent = '—';
        document.getElementById('statSpent').textContent = '£0';
        document.getElementById('statRemaining').textContent = '—';
        document.getElementById('statAvgSpent').textContent = '—';
        document.getElementById('statAvgLeft').textContent = '—';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('progressFill').className = 'progress-fill';
        return;
      }

      const todayStr = toDateStr(current);
      const spent = getPeriodTotal(period);
      const budget = period.amount;
      const remaining = budget - spent;

      const totalDays = daysBetween(period.from, period.to) + 1;
      const daysElapsed = Math.max(1, Math.min(daysBetween(period.from, todayStr) + 1, totalDays));
      const daysLeft = Math.max(0, daysBetween(todayStr, period.to));

      const avgSpent = spent / daysElapsed;
      const avgLeft = daysLeft > 0 ? remaining / daysLeft : 0;

      const pct = Math.min((spent / budget) * 100, 100);

      // Period label
      const fromParts = period.from.split('-');
      const toParts = period.to.split('-');
      document.getElementById('periodLabel').textContent =
        `${parseInt(fromParts[2])} ${MONTHS[parseInt(fromParts[1])-1].slice(0,3)} – ${parseInt(toParts[2])} ${MONTHS[parseInt(toParts[1])-1].slice(0,3)} ${toParts[0]}`;

      document.getElementById('statBudget').textContent = `£${budget.toLocaleString()}`;
      document.getElementById('statSpent').textContent = `£${spent.toFixed(2)}`;

      const remEl = document.getElementById('statRemaining');
      remEl.textContent = `£${Math.abs(remaining).toFixed(2)}`;
      remEl.className = 'budget-stat-val' + (remaining < 0 ? ' over' : remaining / budget < 0.2 ? ' warning' : '');

      document.getElementById('statAvgSpent').textContent = `£${avgSpent.toFixed(2)}`;
      document.getElementById('statAvgLeft').textContent = daysLeft > 0 ? `£${avgLeft.toFixed(2)}` : '—';

      const fill = document.getElementById('progressFill');
      fill.style.width = pct + '%';
      fill.className = 'progress-fill' + (pct >= 100 ? ' over' : pct >= 80 ? ' warning' : '');
    }

    function toggleSetForm() {
      const form = document.getElementById('setForm');
      form.classList.toggle('visible');
      if (form.classList.contains('visible')) {
        const period = getPeriod();
        if (period) {
          document.getElementById('fromDate').value = period.from;
          document.getElementById('toDate').value = period.to;
          document.getElementById('budgetAmt').value = period.amount;
        }
      }
    }

    function savePeriod() {
      const from = document.getElementById('fromDate').value;
      const to = document.getElementById('toDate').value;
      const amount = parseFloat(document.getElementById('budgetAmt').value);
      if (!from || !to || !amount || amount <= 0 || from > to) return;
      localStorage.setItem('budget_period', JSON.stringify({ from, to, amount }));
      document.getElementById('setForm').classList.remove('visible');
      renderBudgetCard();
      renderCalendar();
    }

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;
      const cal = document.getElementById('calendar');
      cal.innerHTML = DAYS.map(d => `<div class="day-header">${d}</div>`).join('');

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const todayStr = toDateStr(current);
      const period = getPeriod();

      for (let i = 0; i < firstDay; i++) cal.innerHTML += `<div class="day empty"></div>`;

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = toDateStr(new Date(viewYear, viewMonth, d));
        const hasSpend = getEntries(dateStr).length > 0;
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate;
        const inPeriod = period && dateStr >= period.from && dateStr <= period.to;

        cal.innerHTML += `<div class="day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${hasSpend ? ' has-spend' : ''}${inPeriod && !isSelected ? ' in-period' : ''}" onclick="selectDate('${dateStr}')">
          <div class="day-num">${d}</div>
          ${hasSpend ? '<div class="day-dot"></div>' : ''}
        </div>`;
      }
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      renderCalendar();
      renderPanel();
    }

    function renderPanel() {
      if (!selectedDate) return;
      document.getElementById('panel').classList.add('visible');

      const [y, m, d] = selectedDate.split('-');
      document.getElementById('panelDate').textContent =
        MONTHS[parseInt(m) - 1] + ' ' + parseInt(d) + ', ' + y;

      const entries = getEntries(selectedDate);
      const t = entries.reduce((s, e) => s + e.val, 0);
      document.getElementById('totalSpend').textContent = '£' + t.toFixed(2);

      document.getElementById('entriesList').innerHTML = entries.slice().reverse().map((e, ri) => {
        const i = entries.length - 1 - ri;
        return `<div class="entry-item">
          <div class="entry-time">${e.time}</div>
          <div class="entry-val">£${e.val.toFixed(2)}</div>
          <button class="entry-del" onclick="deleteEntry(${i})">✕</button>
        </div>`;
      }).join('');
    }

    function addValue() {
      const input = document.getElementById('valueInput');
      const val = parseFloat(input.value);
      if (!val || val <= 0 || !selectedDate) return;
      const entries = getEntries(selectedDate);
      const now = new Date();
      entries.push({ val, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
      saveEntries(selectedDate, entries);
      input.value = '';
      renderCalendar();
      renderPanel();
      renderBudgetCard();
    }

    function deleteEntry(i) {
      const entries = getEntries(selectedDate);
      entries.splice(i, 1);
      saveEntries(selectedDate, entries);
      renderCalendar();
      renderPanel();
      renderBudgetCard();
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      selectedDate = null;
      document.getElementById('panel').classList.remove('visible');
      renderCalendar();
    }

    renderCalendar();
    renderBudgetCard();
  </script>
</body>
</html>
