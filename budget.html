<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Budget Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 72px 24px 48px;
      -webkit-tap-highlight-color: transparent;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
    }

    .month-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      max-width: 320px;
      margin-bottom: 24px;
    }

    .month-label {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.05em;
    }

    .nav-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    .nav-btn:active { color: #fff; }

    .calendar {
      width: 100%;
      max-width: 320px;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
      margin-bottom: 20px;
    }

    .day-header {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #333;
      text-align: center;
      padding: 4px 0 8px;
    }

    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      cursor: pointer;
      background: #141414;
      border: 1px solid #1e1e1e;
      transition: background 0.15s;
      gap: 2px;
    }

    .day.empty {
      background: transparent;
      border-color: transparent;
      cursor: default;
    }

    .day.today {
      border-color: #333;
    }

    .day.selected {
      background: #fff;
      border-color: #fff;
    }

    .day.has-spend {
      border-color: #2a2a2a;
    }

    .day:not(.empty):active { background: #1e1e1e; }
    .day.selected:active { background: #ddd; }

    .day-num {
      font-size: 13px;
      font-weight: 500;
      line-height: 1;
      color: #fff;
    }

    .day.selected .day-num { color: #000; }

    .day-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: #555;
    }

    .day.selected .day-dot { background: #000; opacity: 0.4; }

    /* Entry panel */
    .panel {
      width: 100%;
      max-width: 320px;
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 24px;
      display: none;
    }

    .panel.visible { display: block; }

    .panel-date {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #444;
      margin-bottom: 16px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 20px;
    }

    .total-label {
      font-size: 12px;
      color: #444;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .total-value {
      font-size: 32px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="number"] {
      flex: 1;
      background: #0a0a0a;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 12px 16px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      outline: none;
    }

    input[type="number"]::placeholder { color: #333; }
    input[type="number"]:focus { border-color: #333; }

    button.add-btn {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
    }

    button.add-btn:active { opacity: 0.8; }

    .entries-list {
      margin-top: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .entry-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .entry-time {
      font-size: 12px;
      color: #333;
    }

    .entry-val {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      color: #ccc;
    }

    .entry-del {
      background: none;
      border: none;
      color: #2a2a2a;
      cursor: pointer;
      font-size: 14px;
      padding: 0 0 0 12px;
    }

    .entry-del:active { color: #ef4444; }
  </style>
</head>
<body>

  <a class="back" href="index.html">← Back</a>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="panel" id="panel">
    <div class="panel-date" id="panelDate"></div>
    <div class="total-row">
      <div class="total-label">Total Spend</div>
      <div class="total-value" id="totalSpend">$0</div>
    </div>
    <div class="input-row">
      <input type="number" id="valueInput" placeholder="Add value" min="0" step="0.01" />
      <button class="add-btn" onclick="addValue()">Add</button>
    </div>
    <div class="entries-list" id="entriesList"></div>
  </div>

  <script>
    const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    let current = new Date();
    let viewYear = current.getFullYear();
    let viewMonth = current.getMonth();
    let selectedDate = null;

    function storageKey(dateStr) { return 'budget_' + dateStr; }

    function getEntries(dateStr) {
      return JSON.parse(localStorage.getItem(storageKey(dateStr)) || '[]');
    }

    function saveEntries(dateStr, entries) {
      localStorage.setItem(storageKey(dateStr), JSON.stringify(entries));
    }

    function total(entries) {
      return entries.reduce((s, e) => s + e.val, 0);
    }

    function renderCalendar() {
      document.getElementById('monthLabel').textContent = MONTHS[viewMonth] + ' ' + viewYear;

      const cal = document.getElementById('calendar');
      cal.innerHTML = DAYS.map(d => `<div class="day-header">${d}</div>`).join('');

      const firstDay = new Date(viewYear, viewMonth, 1).getDay();
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const todayStr = toDateStr(current);

      for (let i = 0; i < firstDay; i++) {
        cal.innerHTML += `<div class="day empty"></div>`;
      }

      for (let d = 1; d <= daysInMonth; d++) {
        const dateStr = toDateStr(new Date(viewYear, viewMonth, d));
        const entries = getEntries(dateStr);
        const hasSpend = entries.length > 0;
        const isToday = dateStr === todayStr;
        const isSelected = dateStr === selectedDate;

        cal.innerHTML += `<div class="day${isToday ? ' today' : ''}${isSelected ? ' selected' : ''}${hasSpend ? ' has-spend' : ''}" onclick="selectDate('${dateStr}')">
          <div class="day-num">${d}</div>
          ${hasSpend ? '<div class="day-dot"></div>' : ''}
        </div>`;
      }
    }

    function toDateStr(date) {
      return date.getFullYear() + '-' +
        String(date.getMonth() + 1).padStart(2, '0') + '-' +
        String(date.getDate()).padStart(2, '0');
    }

    function selectDate(dateStr) {
      selectedDate = dateStr;
      renderCalendar();
      renderPanel();
    }

    function renderPanel() {
      if (!selectedDate) return;
      const panel = document.getElementById('panel');
      panel.classList.add('visible');

      const [y, m, d] = selectedDate.split('-');
      document.getElementById('panelDate').textContent =
        MONTHS[parseInt(m) - 1] + ' ' + parseInt(d) + ', ' + y;

      const entries = getEntries(selectedDate);
      document.getElementById('totalSpend').textContent = '$' + total(entries).toFixed(2);

      const list = document.getElementById('entriesList');
      list.innerHTML = entries.slice().reverse().map((e, ri) => {
        const i = entries.length - 1 - ri;
        return `<div class="entry-item">
          <div class="entry-time">${e.time}</div>
          <div class="entry-val">$${e.val.toFixed(2)}</div>
          <button class="entry-del" onclick="deleteEntry(${i})">✕</button>
        </div>`;
      }).join('');
    }

    function addValue() {
      const input = document.getElementById('valueInput');
      const val = parseFloat(input.value);
      if (!val || val <= 0 || !selectedDate) return;
      const entries = getEntries(selectedDate);
      const now = new Date();
      entries.push({ val, time: now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) });
      saveEntries(selectedDate, entries);
      input.value = '';
      renderCalendar();
      renderPanel();
    }

    function deleteEntry(i) {
      const entries = getEntries(selectedDate);
      entries.splice(i, 1);
      saveEntries(selectedDate, entries);
      renderCalendar();
      renderPanel();
    }

    function changeMonth(dir) {
      viewMonth += dir;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      selectedDate = null;
      document.getElementById('panel').classList.remove('visible');
      renderCalendar();
    }

    renderCalendar();
  </script>
</body>
</html>
