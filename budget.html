<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Budget Log</title>
  <link rel="stylesheet" href="budget.css" />
</head>
<body>

  <a class="back" href="index.html">← Back</a>

  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" onclick="changeMonth(1)">›</button>
  </div>

  <!-- Budget Card -->
  <div class="budget-card">
    <div class="budget-top">
      <div class="budget-section-label">Budget</div>
      <button class="budget-set-btn" onclick="toggleSetForm()">Set period</button>
    </div>

    <div class="set-form" id="setForm">
      <div class="set-form-row">
        <div class="set-form-label">From</div>
        <input type="date" id="fromDate" />
      </div>
      <div class="set-form-row">
        <div class="set-form-label">Until</div>
        <input type="date" id="toDate" />
      </div>
      <div class="set-form-row">
        <div class="set-form-label">£</div>
        <input type="number" id="budgetAmt" placeholder="Budget amount" min="0" />
        <button class="save-btn" onclick="savePeriod()">Save</button>
      </div>
    </div>

    <div id="budgetDisplay">
      <div class="budget-period-label" id="periodLabel">No budget set</div>
      <div class="budget-stats">
        <div class="budget-stat">
          <div class="budget-stat-val" id="statBudget">—</div>
          <div class="budget-stat-label">Budget</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val" id="statSpent">£0</div>
          <div class="budget-stat-label">Spent</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val" id="statRemaining">—</div>
          <div class="budget-stat-label">Remaining</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val dim" id="statAvgSpent">—</div>
          <div class="budget-stat-label">Avg/day spent</div>
        </div>
        <div class="budget-stat">
          <div class="budget-stat-val dim" id="statAvgLeft">—</div>
          <div class="budget-stat-label">Avg/day left</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    </div>
  </div>

  <div class="calendar" id="calendar"></div>

  <div class="panel" id="panel">
    <div class="panel-date" id="panelDate"></div>
    <div class="total-row">
      <div class="total-label">Total Spend</div>
      <div class="total-value" id="totalSpend">£0</div>
    </div>
    <div class="input-row">
      <input type="number" id="valueInput" placeholder="Add value" min="0" step="0.01" />
      <button class="add-btn" onclick="addValue()">Add</button>
    </div>
    <div class="entries-list" id="entriesList"></div>
  </div>

  <script src="budget.js"></script>
</body>
</html>
