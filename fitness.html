<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fitness Log</title>
  <link rel="stylesheet" href="fitness.css" />
</head>
<body>

  <!-- Home -->
  <div id="homeScreen">
    <button class="back" onclick="window.location.href='index.html'">← Back</button>
    <h1>Fitness Log</h1>
    <div class="cards">
      <div class="card" id="newSession">
        <div class="card-title">New Session</div>
        <div class="card-desc">Start a new workout</div>
      </div>
      <div class="card" id="loadSession">
        <div class="card-title">Load Existing</div>
        <div class="card-desc">View past workouts</div>
      </div>
    </div>
  </div>

  <!-- New Session -->
  <div id="sessionScreen">
    <button class="back" id="sessionBack">← Back</button>
    <div class="session-header">New Session</div>

    <div id="exerciseList"></div>

    <div class="add-exercise-wrap">
      <div class="search-wrap">
        <input class="search-input" id="exerciseSearch" type="text" placeholder="Search exercise…" autocomplete="off" />
        <div class="search-results hidden" id="searchResults"></div>
      </div>
    </div>

    <button class="btn-ghost" id="saveSessionBtn">Save Session</button>
  </div>

  <!-- Load Existing -->
  <div id="loadScreen">
    <button class="back" id="loadBack">← Back</button>
    <div class="session-header">Past Sessions</div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <script src="fitness.js"></script>
</body>
</html>
