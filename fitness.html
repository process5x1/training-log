<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Fitness Log</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .back {
      position: fixed;
      top: 24px;
      left: 24px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
      text-decoration: none;
      cursor: pointer;
      background: none;
      border: none;
    }

    h1 {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 48px;
    }

    /* ── Home screen ── */
    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 320px;
    }

    .card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 20px;
      padding: 32px 24px;
      color: #fff;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: background 0.15s;
      cursor: pointer;
    }

    .card:active { background: #1e1e1e; }

    .card-title { font-size: 20px; font-weight: 600; }
    .card-desc  { font-size: 12px; letter-spacing: 0.05em; color: #444; }

    /* ── Session screen ── */
    #sessionScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100dvh;
      padding: 88px 24px 48px;
    }

    .session-header {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #555;
      margin-bottom: 32px;
    }

    /* Exercise list */
    #exerciseList {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
      margin-bottom: 24px;
    }

    .exercise-row {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .exercise-row-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* Sets table */
    .sets-table {
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .sets-col-header {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid #1e1e1e;
      margin-bottom: 2px;
    }

    .sets-col-labels {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .col-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2e2e2e;
      height: 34px;
      display: flex;
      align-items: center;
    }

    .set-row {
      display: grid;
      grid-template-columns: 28px 1fr;
      gap: 0 10px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid #141414;
    }

    .set-row:last-child { border-bottom: none; }

    .set-num {
      font-size: 12px;
      color: #444;
      text-align: center;
      padding-top: 8px;
    }

    .set-chip-cols {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    /* Chips */
    .chip-row {
      display: flex;
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      gap: 5px;
    }

    .chip-row::-webkit-scrollbar { display: none; }

    .chip {
      background: #1a1a1a;
      border: 1px solid #242424;
      border-radius: 20px;
      color: #555;
      font-size: 13px;
      font-family: inherit;
      min-width: 32px;
      height: 32px;
      padding: 0 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .chip.selected {
      background: #fff;
      border-color: #fff;
      color: #000;
    }

    .chip:active { opacity: 0.7; }

    .chip-row-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .chip-type-input {
      background: #1a1a1a;
      border: 1px solid #242424;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      font-family: inherit;
      padding: 5px 6px;
      width: 46px;
      text-align: center;
      flex-shrink: 0;
      height: 32px;
    }

    .chip-type-input:focus { outline: none; border-color: #555; }

    .add-set-btn {
      background: #0a1a2a;
      border: 1px solid #1a4a7a;
      border-radius: 10px;
      color: #4a9eff;
      font-size: 12px;
      font-family: inherit;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 11px;
      width: 100%;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      margin-top: 4px;
    }

    .add-set-btn:active { background: #0d2040; }

    /* Exercise action bar */
    .exercise-actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn-complete {
      flex: 1;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      font-family: inherit;
      padding: 10px;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-complete:active { opacity: 0.8; }

    /* Equipment chips */
    .equipment-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: 2px;
    }

    .equipment-row::-webkit-scrollbar { display: none; }

    .equip-chip {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      color: #555;
      font-size: 12px;
      font-family: inherit;
      padding: 5px 12px;
      white-space: nowrap;
      flex-shrink: 0;
      cursor: pointer;
      transition: background 0.1s, color 0.1s, border-color 0.1s;
    }

    .equip-chip.selected {
      background: #1a1a2e;
      border-color: #4a9eff;
      color: #4a9eff;
    }

    .equip-chip:active { opacity: 0.7; }

    /* Summary view */
    .exercise-summary { display: flex; flex-direction: column; gap: 6px; }

    .summary-footer {
      display: flex;
      justify-content: flex-end;
      margin-top: 4px;
    }

    .btn-copy {
      background: none;
      border: none;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
      transition: color 0.15s;
    }

    .btn-copy:active { color: #aaa; }
    .btn-copy.copied { color: #3a3; }

    .summary-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #aaa;
    }

    .summary-set-num {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      min-width: 36px;
    }

    .summary-dot { color: #333; }

    .summary-val { color: #ddd; }

    .exercise-row-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .btn-edit {
      background: none;
      border: none;
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #444;
      font-family: inherit;
      cursor: pointer;
      padding: 0;
    }

    .btn-edit:active { color: #888; }

    .done-badge {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #3a3;
    }

    /* Add exercise area */
    .add-exercise-wrap {
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 32px;
    }

    .search-wrap {
      position: relative;
      width: 100%;
    }

    .search-input {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      padding: 16px 20px;
      width: 100%;
    }

    .search-input::placeholder { color: #444; }
    .search-input:focus { outline: none; border-color: #333; }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      overflow: hidden;
      z-index: 10;
      max-height: 220px;
      overflow-y: auto;
    }

    .search-result-item {
      padding: 14px 20px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid #1e1e1e;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:active { background: #1e1e1e; }

    .result-group {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #444;
    }

    .search-result-custom { border-top: 1px solid #1e1e1e; }
    .search-result-custom .result-group { color: #4a9eff; }

    .btn-primary {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0.05em;
      padding: 16px;
      width: 100%;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .btn-primary:active { opacity: 0.8; }

    .btn-ghost {
      background: #141414;
      color: #888;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      padding: 16px;
      width: 100%;
      max-width: 360px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-ghost:active { background: #1e1e1e; }

    /* ── Load screen ── */
    #loadScreen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100dvh;
      padding: 88px 24px 48px;
    }

    .session-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 360px;
    }

    .session-card {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
    }

    .session-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
    }

    .session-date {
      font-size: 15px;
      font-weight: 600;
    }

    .session-meta {
      font-size: 12px;
      color: #444;
      margin-top: 2px;
    }

    .session-chevron {
      font-size: 14px;
      color: #333;
      transition: transform 0.2s;
    }

    .session-card.open .session-chevron { transform: rotate(90deg); }

    .session-detail {
      display: none;
      flex-direction: column;
      gap: 12px;
      padding: 0 20px 16px;
      border-top: 1px solid #1e1e1e;
    }

    .session-card.open .session-detail { display: flex; }

    .detail-exercise {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 12px;
    }

    .detail-exercise-name {
      font-size: 13px;
      font-weight: 600;
      color: #ddd;
    }

    .detail-equip {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #4a9eff;
      margin-bottom: 4px;
    }

    .detail-set-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #666;
    }

    .detail-set-num {
      min-width: 36px;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #333;
    }

    .detail-val { color: #aaa; }
    .detail-dot { color: #2a2a2a; }

    .empty-state {
      font-size: 13px;
      color: #333;
      text-align: center;
      padding: 48px 0;
      letter-spacing: 0.05em;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- Home -->
  <div id="homeScreen">
    <button class="back" onclick="window.location.href='index.html'">← Back</button>
    <h1>Fitness Log</h1>
    <div class="cards">
      <div class="card" id="newSession">
        <div class="card-title">New Session</div>
        <div class="card-desc">Start a new workout</div>
      </div>
      <div class="card" id="loadSession">
        <div class="card-title">Load Existing</div>
        <div class="card-desc">View past workouts</div>
      </div>
    </div>
  </div>

  <!-- New Session -->
  <div id="sessionScreen">
    <button class="back" id="sessionBack">← Back</button>
    <div class="session-header">New Session</div>

    <div id="exerciseList"></div>

    <div class="add-exercise-wrap">
      <div class="search-wrap">
        <input class="search-input" id="exerciseSearch" type="text" placeholder="Search exercise…" autocomplete="off" />
        <div class="search-results hidden" id="searchResults"></div>
      </div>
    </div>

    <button class="btn-ghost" id="saveSessionBtn">Save Session</button>
  </div>

  <!-- Load Existing -->
  <div id="loadScreen">
    <button class="back" id="loadBack">← Back</button>
    <div class="session-header">Past Sessions</div>
    <div class="session-list" id="sessionList"></div>
  </div>

  <script>
    const EXERCISES_KEY = 'fitnessSessions';

    const EXERCISE_DB = [
      { name: 'Bench Press',               group: 'Chest' },
      { name: 'Incline Bench Press',        group: 'Chest' },
      { name: 'Decline Bench Press',        group: 'Chest' },
      { name: 'Dumbbell Fly',               group: 'Chest' },
      { name: 'Cable Fly',                  group: 'Chest' },
      { name: 'Push-Up',                    group: 'Chest' },
      { name: 'Deadlift',                   group: 'Back' },
      { name: 'Pull-Up',                    group: 'Back' },
      { name: 'Chin-Up',                    group: 'Back' },
      { name: 'Barbell Row',                group: 'Back' },
      { name: 'Dumbbell Row',               group: 'Back' },
      { name: 'Lat Pulldown',               group: 'Back' },
      { name: 'Seated Cable Row',           group: 'Back' },
      { name: 'T-Bar Row',                  group: 'Back' },
      { name: 'Overhead Press',             group: 'Shoulders' },
      { name: 'Dumbbell Shoulder Press',    group: 'Shoulders' },
      { name: 'Lateral Raise',              group: 'Shoulders' },
      { name: 'Front Raise',                group: 'Shoulders' },
      { name: 'Face Pull',                  group: 'Shoulders' },
      { name: 'Arnold Press',               group: 'Shoulders' },
      { name: 'Barbell Curl',               group: 'Arms' },
      { name: 'Dumbbell Curl',              group: 'Arms' },
      { name: 'Hammer Curl',                group: 'Arms' },
      { name: 'Preacher Curl',              group: 'Arms' },
      { name: 'Tricep Pushdown',            group: 'Arms' },
      { name: 'Skull Crusher',              group: 'Arms' },
      { name: 'Overhead Tricep Extension',  group: 'Arms' },
      { name: 'Dips',                       group: 'Arms' },
      { name: 'Squat',                      group: 'Legs' },
      { name: 'Front Squat',                group: 'Legs' },
      { name: 'Leg Press',                  group: 'Legs' },
      { name: 'Romanian Deadlift',          group: 'Legs' },
      { name: 'Leg Curl',                   group: 'Legs' },
      { name: 'Leg Extension',              group: 'Legs' },
      { name: 'Lunge',                      group: 'Legs' },
      { name: 'Bulgarian Split Squat',      group: 'Legs' },
      { name: 'Calf Raise',                 group: 'Legs' },
      { name: 'Plank',                      group: 'Core' },
      { name: 'Crunch',                     group: 'Core' },
      { name: 'Cable Crunch',               group: 'Core' },
      { name: 'Hanging Leg Raise',          group: 'Core' },
      { name: 'Ab Rollout',                 group: 'Core' },
      { name: 'Treadmill',                  group: 'Cardio' },
      { name: 'Cycling',                    group: 'Cardio' },
      { name: 'Rowing Machine',             group: 'Cardio' },
      { name: 'Jump Rope',                  group: 'Cardio' },
    ];

    const searchInput   = document.getElementById('exerciseSearch');
    const searchResults = document.getElementById('searchResults');

    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) { searchResults.classList.add('hidden'); return; }

      const matches = EXERCISE_DB.filter(e => e.name.toLowerCase().includes(q)).slice(0, 8);
      const exactMatch = EXERCISE_DB.some(e => e.name.toLowerCase() === q);
      const typedName = searchInput.value.trim();

      if (!matches.length && !typedName) { searchResults.classList.add('hidden'); return; }

      const matchHTML = matches.map(e => `
        <div class="search-result-item" data-name="${e.name}">
          <span>${e.name}</span>
          <span class="result-group">${e.group}</span>
        </div>
      `).join('');

      const customHTML = !exactMatch && typedName ? `
        <div class="search-result-item search-result-custom" data-name="${typedName}">
          <span>Add "<strong>${typedName}</strong>"</span>
          <span class="result-group">Custom</span>
        </div>
      ` : '';

      searchResults.innerHTML = matchHTML + customHTML;

      searchResults.querySelectorAll('.search-result-item').forEach(item => {
        item.addEventListener('click', () => {
          addExerciseRow(item.dataset.name);
          searchInput.value = '';
          searchResults.classList.add('hidden');
        });
      });

      searchResults.classList.remove('hidden');

      searchInput.onkeydown = e => {
        if (e.key === 'Enter' && typedName) {
          addExerciseRow(typedName);
          searchInput.value = '';
          searchResults.classList.add('hidden');
        }
      };
    });

    document.addEventListener('click', e => {
      if (!e.target.closest('.search-wrap')) searchResults.classList.add('hidden');
    });

    document.getElementById('newSession').addEventListener('click', () => {
      document.getElementById('homeScreen').style.display = 'none';
      const s = document.getElementById('sessionScreen');
      s.style.display = 'flex';
      document.getElementById('exerciseList').innerHTML = '';
      searchInput.value = '';
      searchResults.classList.add('hidden');
    });

    document.getElementById('sessionBack').addEventListener('click', () => {
      document.getElementById('sessionScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';
    });

    document.getElementById('loadSession').addEventListener('click', () => {
      document.getElementById('homeScreen').style.display = 'none';
      document.getElementById('loadScreen').style.display = 'flex';
      renderSessionList();
    });

    document.getElementById('loadBack').addEventListener('click', () => {
      document.getElementById('loadScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';
    });

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    }

    function renderSessionList() {
      const container = document.getElementById('sessionList');
      const all = JSON.parse(localStorage.getItem(EXERCISES_KEY) || '[]').slice().reverse();

      if (!all.length) {
        container.innerHTML = '<div class="empty-state">No sessions saved yet</div>';
        return;
      }

      container.innerHTML = all.map((session, i) => {
        const exerciseCount = session.exercises.length;
        const setCount = session.exercises.reduce((n, e) => n + e.sets.length, 0);

        const detail = session.exercises.map(ex => {
          const equipLine = ex.equipment ? `<div class="detail-equip">${ex.equipment}</div>` : '';
          const setRows = ex.sets.map((s, si) => {
            const parts = [];
            if (s.reps)   parts.push(`<span class="detail-val">${s.reps} reps</span>`);
            if (s.weight) parts.push(`<span class="detail-val">${s.weight} kg</span>`);
            if (s.rest)   parts.push(`<span class="detail-val">${s.rest}s</span>`);
            return `<div class="detail-set-row">
              <span class="detail-set-num">Set ${si + 1}</span>
              ${parts.join('<span class="detail-dot"> · </span>')}
            </div>`;
          }).join('');
          return `<div class="detail-exercise">
            <div class="detail-exercise-name">${ex.name}</div>
            ${equipLine}
            ${setRows}
          </div>`;
        }).join('');

        return `<div class="session-card" data-index="${i}">
          <div class="session-card-header">
            <div>
              <div class="session-date">${formatDate(session.date)}</div>
              <div class="session-meta">${exerciseCount} exercise${exerciseCount !== 1 ? 's' : ''} · ${setCount} sets</div>
            </div>
            <span class="session-chevron">›</span>
          </div>
          <div class="session-detail">${detail}</div>
        </div>`;
      }).join('');

      container.querySelectorAll('.session-card').forEach(card => {
        card.querySelector('.session-card-header').addEventListener('click', () => {
          card.classList.toggle('open');
        });
      });
    }

    function readSets(row) {
      return Array.from(row.querySelectorAll('.set-row')).map((s, i) => {
        const repsChip   = s.querySelector('.reps-chips .chip.selected');
        const weightChip = s.querySelector('.weight-chips .chip.selected');
        const restChip   = s.querySelector('.rest-chips .chip.selected');
        const typeInputs = s.querySelectorAll('.chip-type-input');
        return {
          num:    i + 1,
          reps:   repsChip   ? repsChip.dataset.reps     : typeInputs[0]?.value || '',
          weight: weightChip ? weightChip.dataset.weight : typeInputs[1]?.value || '',
          rest:   restChip   ? restChip.dataset.rest     : typeInputs[2]?.value || '',
        };
      });
    }

    function showSummary(row) {
      const sets = readSets(row);
      const editor = row.querySelector('.exercise-editor');
      editor.classList.add('hidden');

      let summaryEl = row.querySelector('.exercise-summary');
      if (!summaryEl) {
        summaryEl = document.createElement('div');
        summaryEl.className = 'exercise-summary';
        row.appendChild(summaryEl);
      }

      const equip = row.dataset.equipment ? ` — ${row.dataset.equipment}` : '';
      const lines = sets.map(s => {
        const parts = [];
        if (s.reps)   parts.push(`${s.reps} reps`);
        if (s.weight) parts.push(`${s.weight} kg`);
        if (s.rest)   parts.push(`${s.rest}s rest`);
        return `Set ${s.num}  ·  ${parts.join('  ·  ')}`;
      });

      summaryEl.innerHTML = lines.map(line => {
        const [setNum, ...rest] = line.split('  ·  ');
        return `<div class="summary-row">
          <span class="summary-set-num">${setNum}</span>
          ${rest.map(p => `<span class="summary-val">${p}</span>`).join('<span class="summary-dot"> · </span>')}
        </div>`;
      }).join('') + `
        <div class="summary-footer">
          <button class="btn-copy">Copy</button>
        </div>`;

      summaryEl.querySelector('.btn-copy').addEventListener('click', () => {
        const text = `${row.dataset.name}${equip}\n${lines.join('\n')}`;
        navigator.clipboard.writeText(text).then(() => {
          const btn = summaryEl.querySelector('.btn-copy');
          btn.textContent = 'Copied';
          btn.classList.add('copied');
          setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
        });
      });

      summaryEl.classList.remove('hidden');
    }

    const EQUIPMENT = ['Barbell', 'Dumbbell', 'Cable', 'Machine', 'Bodyweight', 'Kettlebell', 'EZ Bar', 'Smith Machine', 'Resistance Band', 'Trap Bar'];

    function addExerciseRow(name) {
      const list = document.getElementById('exerciseList');
      const row = document.createElement('div');
      row.className = 'exercise-row';
      row.dataset.name = name;

      const equipChips = EQUIPMENT.map(e =>
        `<div class="equip-chip" data-equip="${e}">${e}</div>`
      ).join('');

      row.innerHTML = `
        <div class="exercise-row-header">
          <div class="exercise-row-name">${name}</div>
          <button class="btn-edit hidden">Edit</button>
        </div>
        <div class="equipment-row">${equipChips}</div>
        <div class="exercise-editor">
          <div class="sets-table">
            <div class="sets-col-header">
              <span></span>
              <div class="sets-col-labels">
                <span class="col-label">Reps</span>
                <span class="col-label">Weight</span>
                <span class="col-label">Rest</span>
              </div>
            </div>
          </div>
          <button class="add-set-btn">+ Add Set</button>
          <div class="exercise-actions">
            <button class="btn-complete">Complete</button>
          </div>
        </div>
      `;

      row.querySelectorAll('.equip-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          row.querySelectorAll('.equip-chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          row.dataset.equipment = chip.dataset.equip;
        });
      });

      row.querySelector('.add-set-btn').addEventListener('click', () => addSetRow(row));

      row.querySelector('.btn-complete').addEventListener('click', () => {
        showSummary(row);
        row.querySelector('.btn-edit').classList.remove('hidden');
      });

      row.querySelector('.btn-edit').addEventListener('click', () => {
        row.querySelector('.exercise-summary')?.classList.add('hidden');
        row.querySelector('.exercise-editor').classList.remove('hidden');
        row.querySelector('.btn-edit').classList.add('hidden');
      });

      addSetRow(row);
      list.appendChild(row);
    }

    const WEIGHT_CHIPS = [];
    for (let w = 2.5; w <= 100; w += 2.5) WEIGHT_CHIPS.push(w % 1 === 0 ? w : w.toFixed(1));

    const REST_CHIPS = [
      { label: '30s', value: 30 },
      { label: '45s', value: 45 },
      { label: '1m',  value: 60 },
      { label: '90s', value: 90 },
      { label: '2m',  value: 120 },
      { label: '3m',  value: 180 },
    ];

    function makeChips(items, dataKey, cls = '') {
      return items.map(item => {
        const label = item.label ?? item;
        const val   = item.value ?? item;
        return `<div class="chip ${cls}" data-${dataKey}="${val}">${label}</div>`;
      }).join('');
    }

    function bindChips(container, dataKey, input) {
      container.querySelectorAll('.chip').forEach(chip => {
        chip.addEventListener('click', () => {
          container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          chip.classList.add('selected');
          if (input) input.value = chip.dataset[dataKey];
        });
      });

      if (input) {
        input.addEventListener('input', () => {
          const val = input.value.trim();
          container.querySelectorAll('.chip').forEach(c => c.classList.remove('selected'));
          const match = [...container.querySelectorAll('.chip')]
            .find(c => String(c.dataset[dataKey]) === String(val));
          if (match) {
            match.classList.add('selected');
            match.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
          }
        });
      }
    }

    function addSetRow(exerciseRow) {
      const table = exerciseRow.querySelector('.sets-table');
      const setNum = table.querySelectorAll('.set-row').length + 1;

      const setRow = document.createElement('div');
      setRow.className = 'set-row';
      setRow.innerHTML = `
        <span class="set-num">${setNum}</span>
        <div class="set-chip-cols">
          <div class="chip-row-wrap">
            <input class="chip-type-input" type="number" min="1" placeholder="—" />
            <div class="chip-row reps-chips">${makeChips(Array.from({length:15},(_,i)=>i+1), 'reps')}</div>
          </div>
          <div class="chip-row-wrap">
            <input class="chip-type-input" type="number" min="0" step="0.5" placeholder="—" />
            <div class="chip-row weight-chips">${makeChips(WEIGHT_CHIPS, 'weight')}</div>
          </div>
          <div class="chip-row-wrap">
            <input class="chip-type-input" type="number" min="0" placeholder="—" />
            <div class="chip-row rest-chips">${makeChips(REST_CHIPS, 'rest')}</div>
          </div>
        </div>
      `;

      const inputs = setRow.querySelectorAll('.chip-type-input');
      bindChips(setRow.querySelector('.reps-chips'),   'reps',   inputs[0]);
      bindChips(setRow.querySelector('.weight-chips'), 'weight', inputs[1]);
      bindChips(setRow.querySelector('.rest-chips'),   'rest',   inputs[2]);

      table.appendChild(setRow);
    }

    document.getElementById('saveSessionBtn').addEventListener('click', () => {
      const rows = document.querySelectorAll('.exercise-row');
      if (!rows.length) return;

      const exercises = Array.from(rows).map(row => {
        const sets = readSets(row);
        return { name: row.dataset.name, equipment: row.dataset.equipment || '', sets };
      });

      const session = { date: new Date().toISOString(), exercises };
      const all = JSON.parse(localStorage.getItem(EXERCISES_KEY) || '[]');
      all.push(session);
      localStorage.setItem(EXERCISES_KEY, JSON.stringify(all));

      document.getElementById('sessionScreen').style.display = 'none';
      document.getElementById('homeScreen').style.display = 'flex';
    });
  </script>

</body>
</html>
