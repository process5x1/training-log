<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Nutrition Tracker</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0f172a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      min-height: 100dvh;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .screen {
      display: none;
      flex-direction: column;
      align-items: center;
      width: 100%;
      min-height: 100dvh;
      padding: 80px 20px 48px;
    }

    .screen-title {
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #64748b;
      margin-bottom: 28px;
      width: 100%;
      max-width: 380px;
    }

    .back-btn {
      position: fixed;
      top: 24px;
      left: 20px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      z-index: 10;
    }

    .settings-btn {
      position: fixed;
      top: 24px;
      right: 20px;
      font-size: 13px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #64748b;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
      z-index: 10;
    }

    .btn-primary {
      background: #fff;
      color: #000;
      border: none;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      padding: 15px;
      width: 100%;
      max-width: 380px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn-primary:active { opacity: 0.8; }

    .btn-blue {
      background: #0a1a2a;
      border: 1px solid #1a4a7a;
      border-radius: 14px;
      color: #4a9eff;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      padding: 15px;
      width: 100%;
      max-width: 380px;
      cursor: pointer;
    }
    .btn-blue:active { background: #0d2040; }

    .btn-ghost {
      background: #1e293b;
      color: #666;
      border: 1px solid #334155;
      border-radius: 14px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      padding: 15px;
      width: 100%;
      max-width: 380px;
      cursor: pointer;
    }
    .btn-ghost:active { background: #334155; }

    .text-input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      padding: 15px 18px;
      width: 100%;
      max-width: 380px;
    }
    .text-input:focus { outline: none; border-color: #475569; }
    .text-input::placeholder { color: #475569; }

    .gap    { height: 12px; }
    .gap-lg { height: 20px; }
    .hidden { display: none !important; }

    /* Home */
    .macro-bar-wrap {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 20px;
    }

    .macro-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .macro-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      width: 56px;
      flex-shrink: 0;
    }

    .macro-track {
      flex: 1;
      height: 4px;
      background: #1e293b;
      border-radius: 2px;
      overflow: hidden;
    }

    .macro-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
    .macro-fill.protein { background: #4a9eff; }
    .macro-fill.carbs   { background: #f59e0b; }
    .macro-fill.fat     { background: #a78bfa; }

    .macro-val {
      font-size: 12px;
      color: #64748b;
      width: 78px;
      text-align: right;
      flex-shrink: 0;
    }

    .log-list {
      width: 100%;
      max-width: 380px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .log-item {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .log-item-name    { font-size: 14px; font-weight: 500; }
    .log-item-macros  { font-size: 11px; color: #64748b; margin-top: 2px; }

    .log-item-delete {
      background: none;
      border: none;
      color: #475569;
      font-size: 18px;
      cursor: pointer;
      padding: 0 0 0 12px;
      font-family: inherit;
    }

    .empty-log {
      font-size: 13px;
      color: #334155;
      text-align: center;
      padding: 32px 0;
    }

    .home-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 380px;
    }

    .action-row { display: flex; gap: 10px; }
    .action-row .btn-ghost { flex: 1; }

    .ai-result {
      width: 100%;
      max-width: 380px;
      background: #0d1a0d;
      border: 1px solid #1a3a1a;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 1.6;
      color: #8bc88b;
      white-space: pre-wrap;
      margin-bottom: 12px;
    }
    .ai-result.loading { color: #475569; font-style: italic; }
    .ai-result.error   { color: #884444; background: #1a0d0d; border-color: #3a1a1a; }

    /* Search */
    .search-wrap {
      position: relative;
      width: 100%;
      max-width: 380px;
    }

    .search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      overflow: hidden;
      z-index: 10;
      max-height: 280px;
      overflow-y: auto;
    }

    .search-result-item {
      padding: 13px 18px;
      font-size: 14px;
      cursor: pointer;
      border-bottom: 1px solid #334155;
    }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:active { background: #334155; }
    .result-name { font-weight: 500; }
    .result-meta { font-size: 11px; color: #64748b; margin-top: 2px; }

    /* Food detail */
    .food-detail-name {
      font-size: 18px;
      font-weight: 600;
      width: 100%;
      max-width: 380px;
      margin-bottom: 4px;
    }

    .food-detail-source {
      font-size: 11px;
      color: #64748b;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      width: 100%;
      max-width: 380px;
      margin-bottom: 20px;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 20px;
    }

    .macro-cell {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 10px;
      text-align: center;
    }

    .macro-cell-val { font-size: 20px; font-weight: 600; }
    .macro-cell-val.protein { color: #4a9eff; }
    .macro-cell-val.carbs   { color: #f59e0b; }
    .macro-cell-val.fat     { color: #a78bfa; }
    .macro-cell-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: #64748b; margin-top: 4px; }

    .gram-input-wrap {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 16px;
      align-items: center;
    }

    .gram-input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      color: #fff;
      font-size: 22px;
      font-family: inherit;
      font-weight: 600;
      padding: 12px 16px;
      width: 110px;
      text-align: center;
    }
    .gram-input:focus { outline: none; border-color: #475569; }
    .gram-label { font-size: 13px; color: #64748b; }

    /* Barcode */
    #reader {
      width: 100%;
      max-width: 380px;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 16px;
    }

    /* Fridge */
    .fridge-input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 14px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      padding: 15px 18px;
      width: 100%;
      max-width: 380px;
      resize: none;
      height: 120px;
      line-height: 1.5;
    }
    .fridge-input:focus { outline: none; border-color: #475569; }
    .fridge-input::placeholder { color: #475569; }

    /* Settings */
    .settings-label {
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #64748b;
      width: 100%;
      max-width: 380px;
      margin-bottom: 8px;
    }

    .settings-note {
      font-size: 12px;
      color: #334155;
      width: 100%;
      max-width: 380px;
      line-height: 1.5;
      margin-top: 8px;
    }

    .target-row {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      max-width: 380px;
      margin-bottom: 10px;
    }
    .target-row label { font-size: 13px; color: #666; width: 80px; flex-shrink: 0; }

    .target-input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      color: #fff;
      font-size: 14px;
      font-family: inherit;
      padding: 10px 14px;
      width: 90px;
      text-align: center;
    }
    .target-input:focus { outline: none; border-color: #475569; }
    .target-unit { font-size: 12px; color: #475569; }
  </style>
</head>
<body>

  <!-- Home -->
  <div id="homeScreen" class="screen">
    <a class="back-btn" href="index.html">← Back</a>
    <button class="settings-btn" id="openSettings">Settings</button>

    <div class="screen-title">Nutrition Log</div>

    <div class="macro-bar-wrap">
      <div class="macro-row">
        <span class="macro-label">Protein</span>
        <div class="macro-track"><div class="macro-fill protein" id="barProtein" style="width:0%"></div></div>
        <span class="macro-val" id="valProtein">0 / 150g</span>
      </div>
      <div class="macro-row">
        <span class="macro-label">Carbs</span>
        <div class="macro-track"><div class="macro-fill carbs" id="barCarbs" style="width:0%"></div></div>
        <span class="macro-val" id="valCarbs">0 / 200g</span>
      </div>
      <div class="macro-row">
        <span class="macro-label">Fat</span>
        <div class="macro-track"><div class="macro-fill fat" id="barFat" style="width:0%"></div></div>
        <span class="macro-val" id="valFat">0 / 65g</span>
      </div>
    </div>

    <div class="log-list" id="logList"></div>

    <div id="aiAnalysisResult" class="hidden"></div>

    <div class="home-actions">
      <input class="text-input" id="quickSearch" type="text" placeholder='Search or type "4 whole eggs"…' autocomplete="off" />
      <div class="action-row">
        <button class="btn-ghost" id="openBarcode">Scan Barcode</button>
        <button class="btn-ghost" id="openFridge">My Fridge</button>
      </div>
      <button class="btn-blue" id="analyseBtn">Analyse My Day</button>
    </div>
  </div>

  <!-- Search / Food detail -->
  <div id="searchScreen" class="screen">
    <button class="back-btn" id="searchBack">← Back</button>
    <div class="screen-title">Add Food</div>

    <div class="search-wrap">
      <input class="text-input" id="searchInput" type="text" placeholder='e.g. "4 whole eggs"' autocomplete="off" />
      <div class="search-results hidden" id="searchResults"></div>
    </div>
    <div class="gap"></div>

    <div id="foodDetail" class="hidden" style="width:100%;max-width:380px;display:flex;flex-direction:column;align-items:flex-start;">
      <div class="food-detail-name" id="detailName"></div>
      <div class="food-detail-source" id="detailSource"></div>
      <div class="macro-grid">
        <div class="macro-cell">
          <div class="macro-cell-val protein" id="detailProtein">0g</div>
          <div class="macro-cell-label">Protein</div>
        </div>
        <div class="macro-cell">
          <div class="macro-cell-val carbs" id="detailCarbs">0g</div>
          <div class="macro-cell-label">Carbs</div>
        </div>
        <div class="macro-cell">
          <div class="macro-cell-val fat" id="detailFat">0g</div>
          <div class="macro-cell-label">Fat</div>
        </div>
      </div>
      <div class="gram-input-wrap">
        <input class="gram-input" id="gramInput" type="number" value="100" min="1" />
        <span class="gram-label">grams</span>
      </div>
      <button class="btn-primary" id="addFoodBtn">Add to Log</button>
    </div>
  </div>

  <!-- Barcode -->
  <div id="barcodeScreen" class="screen">
    <button class="back-btn" id="barcodeBack">← Back</button>
    <div class="screen-title">Scan Barcode</div>
    <div id="reader"></div>
    <div id="barcodeStatus" style="font-size:13px;color:#444;text-align:center;width:100%;max-width:380px;">Point camera at barcode</div>
  </div>

  <!-- Fridge -->
  <div id="fridgeScreen" class="screen">
    <button class="back-btn" id="fridgeBack">← Back</button>
    <div class="screen-title">What's in my fridge?</div>
    <textarea class="fridge-input" id="fridgeInput" placeholder="e.g. chicken breast, eggs, spinach, rice, olive oil…"></textarea>
    <div class="gap"></div>
    <div id="fridgeResult" class="hidden"></div>
    <button class="btn-primary" id="suggestBtn">Suggest Meals</button>
  </div>

  <!-- Settings -->
  <div id="settingsScreen" class="screen">
    <button class="back-btn" id="settingsBack">← Back</button>
    <div class="screen-title">Settings</div>

    <div class="settings-label">Claude API Key</div>
    <input class="text-input" id="apiKeyInput" type="password" placeholder="sk-ant-…" />
    <div class="settings-note">Get a key at console.anthropic.com — stored only in your browser, never uploaded.</div>

    <div class="gap-lg"></div>

    <div class="settings-label">Daily Targets</div>
    <div class="target-row"><label>Protein</label><input class="target-input" id="targetProtein" type="number" value="150" /><span class="target-unit">g</span></div>
    <div class="target-row"><label>Carbs</label>  <input class="target-input" id="targetCarbs"   type="number" value="200" /><span class="target-unit">g</span></div>
    <div class="target-row"><label>Fat</label>    <input class="target-input" id="targetFat"     type="number" value="65"  /><span class="target-unit">g</span></div>

    <div class="gap-lg"></div>
    <button class="btn-primary" id="saveSettings">Save</button>
  </div>

  <script>
    const STORAGE_KEY  = 'nutritionLog_v1';
    const SETTINGS_KEY = 'nutritionSettings';
    const USDA_KEY     = 'DEMO_KEY';

    let selectedFood = null;
    let scanner      = null;

    function getSettings() {
      return JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}');
    }

    function getTargets() {
      const s = getSettings();
      return { protein: s.protein || 150, carbs: s.carbs || 200, fat: s.fat || 65 };
    }

    function getTodayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    function getLog() {
      const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      return all[getTodayKey()] || [];
    }

    function saveLog(log) {
      const all = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      all[getTodayKey()] = log;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(all));
    }

    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
      document.getElementById(id).style.display = 'flex';
    }

    // ── Home ──
    function renderHome() {
      const log     = getLog();
      const targets = getTargets();
      let p = 0, c = 0, f = 0;
      log.forEach(item => { p += item.protein; c += item.carbs; f += item.fat; });

      document.getElementById('barProtein').style.width = Math.min(100, p / targets.protein * 100) + '%';
      document.getElementById('barCarbs').style.width   = Math.min(100, c / targets.carbs   * 100) + '%';
      document.getElementById('barFat').style.width     = Math.min(100, f / targets.fat     * 100) + '%';
      document.getElementById('valProtein').textContent = `${Math.round(p)} / ${targets.protein}g`;
      document.getElementById('valCarbs').textContent   = `${Math.round(c)} / ${targets.carbs}g`;
      document.getElementById('valFat').textContent     = `${Math.round(f)} / ${targets.fat}g`;

      const list = document.getElementById('logList');
      if (!log.length) {
        list.innerHTML = '<div class="empty-log">Nothing logged yet</div>';
        return;
      }
      list.innerHTML = log.map((item, i) => `
        <div class="log-item">
          <div>
            <div class="log-item-name">${item.name}${item.grams ? ` — ${item.grams}g` : ''}</div>
            <div class="log-item-macros">P ${Math.round(item.protein)}g · C ${Math.round(item.carbs)}g · F ${Math.round(item.fat)}g</div>
          </div>
          <button class="log-item-delete" data-i="${i}">×</button>
        </div>
      `).join('');

      list.querySelectorAll('.log-item-delete').forEach(btn => {
        btn.addEventListener('click', () => {
          const l = getLog(); l.splice(+btn.dataset.i, 1); saveLog(l); renderHome();
        });
      });
    }

    // Quick search from home input
    document.getElementById('quickSearch').addEventListener('focus', () => {
      showScreen('searchScreen');
      document.getElementById('searchInput').focus();
    });

    // ── Search screen ──
    document.getElementById('searchBack').addEventListener('click', () => {
      showScreen('homeScreen'); renderHome();
    });

    let searchTimer = null;
    document.getElementById('searchInput').addEventListener('input', e => {
      const q = e.target.value.trim();
      document.getElementById('foodDetail').classList.add('hidden');
      if (q.length < 2) { document.getElementById('searchResults').classList.add('hidden'); return; }
      clearTimeout(searchTimer);
      searchTimer = setTimeout(() => runSearch(q), 400);
    });

    async function runSearch(q) {
      const resultsEl = document.getElementById('searchResults');
      resultsEl.innerHTML = '<div class="search-result-item" style="color:#333;cursor:default">Searching…</div>';
      resultsEl.classList.remove('hidden');
      try {
        const res  = await fetch(`https://api.nal.usda.gov/fdc/v1/foods/search?query=${encodeURIComponent(q)}&api_key=${USDA_KEY}&pageSize=8&dataType=SR%20Legacy,Survey%20(FNDDS)`);
        const data = await res.json();
        const foods = (data.foods || []).slice(0, 8);
        if (!foods.length) { resultsEl.innerHTML = '<div class="search-result-item" style="color:#333;cursor:default">No results found</div>'; return; }

        resultsEl.innerHTML = foods.map((food, i) => {
          const nutrients = food.foodNutrients || [];
          const get = name => { const n = nutrients.find(n => n.nutrientName?.toLowerCase().includes(name)); return n ? Math.round(n.value * 10) / 10 : 0; };
          return `<div class="search-result-item" data-i="${i}">
            <div class="result-name">${food.description}</div>
            <div class="result-meta">P ${get('protein')}g · C ${get('carbohydrate')}g · F ${get('total lipid')}g per 100g</div>
          </div>`;
        }).join('');

        resultsEl.querySelectorAll('.search-result-item').forEach((item, i) => {
          item.addEventListener('click', () => {
            const food = foods[i];
            const nutrients = food.foodNutrients || [];
            const get = name => { const n = nutrients.find(n => n.nutrientName?.toLowerCase().includes(name)); return n ? n.value : 0; };
            selectedFood = { name: food.description, protein100: get('protein'), carbs100: get('carbohydrate'), fat100: get('total lipid'), source: 'USDA Food Database' };
            resultsEl.classList.add('hidden');
            showFoodDetail();
          });
        });
      } catch(e) {
        resultsEl.innerHTML = '<div class="search-result-item" style="color:#555;cursor:default">Search failed — check your connection</div>';
      }
    }

    function showFoodDetail() {
      const detail = document.getElementById('foodDetail');
      detail.classList.remove('hidden');
      document.getElementById('detailName').textContent   = selectedFood.name;
      document.getElementById('detailSource').textContent = selectedFood.source;
      document.getElementById('gramInput').value          = 100;
      updateDetailMacros();
    }

    document.getElementById('gramInput').addEventListener('input', updateDetailMacros);

    function updateDetailMacros() {
      if (!selectedFood) return;
      const g = parseFloat(document.getElementById('gramInput').value) || 0;
      const r = g / 100;
      document.getElementById('detailProtein').textContent = Math.round(selectedFood.protein100 * r * 10) / 10 + 'g';
      document.getElementById('detailCarbs').textContent   = Math.round(selectedFood.carbs100   * r * 10) / 10 + 'g';
      document.getElementById('detailFat').textContent     = Math.round(selectedFood.fat100     * r * 10) / 10 + 'g';
    }

    document.getElementById('addFoodBtn').addEventListener('click', () => {
      const g = parseFloat(document.getElementById('gramInput').value) || 100;
      const r = g / 100;
      const log = getLog();
      log.push({ name: selectedFood.name, grams: g, protein: selectedFood.protein100 * r, carbs: selectedFood.carbs100 * r, fat: selectedFood.fat100 * r });
      saveLog(log);
      selectedFood = null;
      document.getElementById('foodDetail').classList.add('hidden');
      document.getElementById('searchInput').value = '';
      showScreen('homeScreen');
      renderHome();
    });

    // ── Barcode ──
    document.getElementById('openBarcode').addEventListener('click', () => { showScreen('barcodeScreen'); startScanner(); });
    document.getElementById('barcodeBack').addEventListener('click', () => { stopScanner(); showScreen('homeScreen'); });

    function startScanner() {
      const status = document.getElementById('barcodeStatus');
      scanner = new Html5Qrcode('reader');
      scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 260, height: 120 } },
        async barcode => {
          stopScanner();
          status.textContent = 'Looking up product…';
          try {
            const res  = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
            const data = await res.json();
            if (data.status !== 1) { status.textContent = 'Product not found in database'; return; }
            const n = data.product.nutriments;
            selectedFood = { name: data.product.product_name || 'Unknown product', protein100: n['proteins_100g'] || 0, carbs100: n['carbohydrates_100g'] || 0, fat100: n['fat_100g'] || 0, source: 'Open Food Facts' };
            showScreen('searchScreen');
            document.getElementById('searchInput').value = '';
            document.getElementById('searchResults').classList.add('hidden');
            showFoodDetail();
          } catch(e) { status.textContent = 'Lookup failed'; }
        },
        () => {}
      ).catch(() => { status.textContent = 'Camera access denied — allow camera permission'; });
    }

    function stopScanner() {
      if (scanner) { scanner.stop().catch(() => {}); scanner = null; }
    }

    // ── Analyse ──
    document.getElementById('analyseBtn').addEventListener('click', async () => {
      const { apiKey } = getSettings();
      if (!apiKey) { alert('Add your Claude API key in Settings first.'); return; }
      const log = getLog();
      if (!log.length) { alert('Log some food first.'); return; }

      const resultEl = document.getElementById('aiAnalysisResult');
      resultEl.className = 'ai-result loading';
      resultEl.textContent = 'Analysing your day…';
      resultEl.classList.remove('hidden');

      const targets = getTargets();
      let p = 0, c = 0, f = 0;
      log.forEach(i => { p += i.protein; c += i.carbs; f += i.fat; });
      const cal = Math.round(p * 4 + c * 4 + f * 9);
      const logText = log.map(i => `- ${i.name}${i.grams ? ` (${i.grams}g)` : ''}: P${Math.round(i.protein)}g C${Math.round(i.carbs)}g F${Math.round(i.fat)}g`).join('\n');
      const prompt = `You are a nutrition coach. The user has logged today:\n${logText}\n\nTotals: ${Math.round(p)}g protein, ${Math.round(c)}g carbs, ${Math.round(f)}g fat (${cal} kcal)\nDaily targets: ${targets.protein}g protein, ${targets.carbs}g carbs, ${targets.fat}g fat\n\nGive 2-3 short, specific, practical pieces of feedback. Be direct. Under 120 words.`;

      try {
        resultEl.className = 'ai-result';
        resultEl.textContent = await callClaude(apiKey, prompt);
      } catch(e) {
        resultEl.className = 'ai-result error';
        resultEl.textContent = 'Error: ' + e.message;
      }
    });

    // ── Fridge ──
    document.getElementById('openFridge').addEventListener('click', () => showScreen('fridgeScreen'));
    document.getElementById('fridgeBack').addEventListener('click', () => { showScreen('homeScreen'); renderHome(); });

    document.getElementById('suggestBtn').addEventListener('click', async () => {
      const { apiKey } = getSettings();
      if (!apiKey) { alert('Add your Claude API key in Settings first.'); return; }
      const ingredients = document.getElementById('fridgeInput').value.trim();
      if (!ingredients) { alert('Enter some ingredients first.'); return; }

      const resultEl = document.getElementById('fridgeResult');
      resultEl.className = 'ai-result loading';
      resultEl.textContent = 'Thinking up meals…';
      resultEl.classList.remove('hidden');

      const targets = getTargets();
      const log = getLog();
      let p = 0, c = 0, f = 0;
      log.forEach(i => { p += i.protein; c += i.carbs; f += i.fat; });
      const remP = Math.max(0, targets.protein - Math.round(p));
      const remC = Math.max(0, targets.carbs   - Math.round(c));
      const remF = Math.max(0, targets.fat     - Math.round(f));

      const prompt = `You are a nutrition coach. The user has these ingredients:\n${ingredients}\n\nRemaining daily targets: ${remP}g protein, ${remC}g carbs, ${remF}g fat\n\nSuggest 2-3 simple meal ideas using these ingredients that help hit the remaining targets. For each: name, key ingredients, rough macros (P/C/F in grams). Concise, under 180 words.`;

      try {
        resultEl.className = 'ai-result';
        resultEl.textContent = await callClaude(apiKey, prompt);
      } catch(e) {
        resultEl.className = 'ai-result error';
        resultEl.textContent = 'Error: ' + e.message;
      }
    });

    // ── Claude API ──
    async function callClaude(key, prompt) {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
          'content-type': 'application/json',
        },
        body: JSON.stringify({ model: 'claude-haiku-4-5-20251001', max_tokens: 512, messages: [{ role: 'user', content: prompt }] }),
      });
      if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `HTTP ${res.status}`); }
      const data = await res.json();
      return data.content[0].text;
    }

    // ── Settings ──
    document.getElementById('openSettings').addEventListener('click', () => {
      const s = getSettings();
      document.getElementById('apiKeyInput').value   = s.apiKey   || '';
      document.getElementById('targetProtein').value = s.protein  || 150;
      document.getElementById('targetCarbs').value   = s.carbs    || 200;
      document.getElementById('targetFat').value     = s.fat      || 65;
      showScreen('settingsScreen');
    });

    document.getElementById('settingsBack').addEventListener('click', () => { showScreen('homeScreen'); renderHome(); });

    document.getElementById('saveSettings').addEventListener('click', () => {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify({
        apiKey:  document.getElementById('apiKeyInput').value.trim(),
        protein: +document.getElementById('targetProtein').value || 150,
        carbs:   +document.getElementById('targetCarbs').value   || 200,
        fat:     +document.getElementById('targetFat').value     || 65,
      }));
      showScreen('homeScreen');
      renderHome();
    });

    // ── Init ──
    showScreen('homeScreen');
    renderHome();
  </script>
</body>
</html>
